name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  python:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v6
      - run: uv lock --check
      - run: uv run --locked ruff format --check bench.py test_bench.py
      - run: uv run --locked ruff check bench.py test_bench.py
      - run: uv run --locked mypy bench.py test_bench.py
      - run: uv run --locked pytest -q

  rust:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - run: echo "CARGO_INCREMENTAL=0" >> "$GITHUB_ENV"
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - run: rustup component add clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings

  benchmark-smoke:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - run: echo "CARGO_INCREMENTAL=0" >> "$GITHUB_ENV"
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v6
      - uses: Swatinem/rust-cache@v2
      - run: uv run --locked ./bench.py --rounds 1 --treatments off --timeout-sec 120 --report .reports.ci.jsonl egglog/tests/integer_math.egg

  codspeed:
    name: codspeed (${{ matrix.mode }})
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        mode:
          - simulation
          - memory
    steps:
      - run: echo "CARGO_INCREMENTAL=0" >> "$GITHUB_ENV"
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-codspeed@4.0.1
      - uses: Swatinem/rust-cache@v2
      - run: cargo codspeed build -p egglog-experimental --bench files
      - uses: CodSpeedHQ/action@v4
        with:
          run: cargo codspeed run files
          mode: ${{ matrix.mode }}
